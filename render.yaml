services:
  - type: web
    name: mergeguard-ai-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: ALLOWED_ORIGIN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
